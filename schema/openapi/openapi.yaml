          maxLength: 80
        symbol:
          nullable: true
          type: string
          maxLength: 8
        decimal_places:
          type: integer
          format: int32
        is_active:
          type: boolean
        metadata:
          type: object

    CurrencyList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Currency'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

