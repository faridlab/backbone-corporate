components:
  schemas:
    Currency:
      type: object
      required:
        - id
        - iso_code
        - name
        - decimal_places
        - is_active
        - metadata
      properties:
        id:
          type: string
          format: uuid
        iso_code:
          type: string
          maxLength: 3
        name:
          type: string
          maxLength: 80
        symbol:
          nullable: true
          type: string
          maxLength: 8
        decimal_places:
          type: integer
          format: int32
        is_active:
          type: boolean
        metadata:
          type: object

    CurrencyBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Currency'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreateCurrencyRequest:
      type: object
      required:
        - iso_code
        - name
        - decimal_places
        - is_active
        - metadata
      properties:
        iso_code:
          type: string
          maxLength: 3
        name:
          type: string
          maxLength: 80
        symbol:
          nullable: true
          type: string
          maxLength: 8
        decimal_places:
          type: integer
          format: int32
        is_active:
          type: boolean
        metadata:
          type: object

    UpdateCurrencyRequest:
      type: object
      required:
